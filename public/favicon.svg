<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient: slightly lighter center -->
    <radialGradient id="bg" cx="45%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <!-- Bolt gradient: amber top → deep orange bottom -->
    <linearGradient id="bolt" x1="55%" y1="0%" x2="45%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="55%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <!-- Soft glow behind bolt -->
    <filter id="glow" x="-35%" y="-25%" width="170%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Wheel outer ring (tire) -->
  <circle cx="256" cy="256" r="202" fill="none" stroke="#374151" stroke-width="26"/>

  <!-- 4 cardinal spokes (stop just inside the ring, leave gap at hub) -->
  <line x1="256" y1="66"  x2="256" y2="218" stroke="#2d3748" stroke-width="11" stroke-linecap="round"/>
  <line x1="256" y1="294" x2="256" y2="446" stroke="#2d3748" stroke-width="11" stroke-linecap="round"/>
  <line x1="66"  y1="256" x2="218" y2="256" stroke="#2d3748" stroke-width="11" stroke-linecap="round"/>
  <line x1="294" y1="256" x2="446" y2="256" stroke="#2d3748" stroke-width="11" stroke-linecap="round"/>

  <!-- 4 diagonal spokes -->
  <line x1="113" y1="113" x2="212" y2="212" stroke="#2d3748" stroke-width="11" stroke-linecap="round"/>
  <line x1="300" y1="300" x2="399" y2="399" stroke="#2d3748" stroke-width="11" stroke-linecap="round"/>
  <line x1="399" y1="113" x2="300" y2="212" stroke="#2d3748" stroke-width="11" stroke-linecap="round"/>
  <line x1="212" y1="300" x2="113" y2="399" stroke="#2d3748" stroke-width="11" stroke-linecap="round"/>

  <!-- Hub -->
  <circle cx="256" cy="256" r="32" fill="#374151"/>

  <!-- Lightning bolt — soft glow layer -->
  <path d="M 291 88 L 183 272 L 248 272 L 168 420 L 330 240 L 265 240 Z"
        fill="#fb923c" opacity="0.35" filter="url(#glow)"/>

  <!-- Lightning bolt — main shape -->
  <path d="M 291 88 L 183 272 L 248 272 L 168 420 L 330 240 L 265 240 Z"
        fill="url(#bolt)"/>
</svg>
